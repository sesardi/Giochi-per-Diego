<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>L Incastro Magico</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(to bottom, #6a11cb 0%, #2575fc 100%);
            overflow: hidden;
            font-family: 'Arial Round', 'Comic Sans MS', sans-serif;
            user-select: none;
            -webkit-user-select: none;
            height: 100vh;
            position: relative;
        }

        /* SFONDO MAGICO */
        .stelle {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(white 1px, transparent 0);
            background-size: 40px 40px;
            opacity: 0.3;
            pointer-events: none;
        }

        /* INTERFACCIA SUPERIORE */
        #top-bar {
            position: absolute;
            top: 15px;
            left: 0;
            width: 100%;
            box-sizing: border-box;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        #hud {
            font-size: 4.5vw;
            @media (min-width: 600px) { font-size: 1.6rem; }
            font-weight: bold;
            color: #fff;
            background: rgba(255, 255, 255, 0.2);
            padding: 8px 20px;
            border-radius: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            text-align: center;
            flex-grow: 1;
            margin: 0 10px;
            backdrop-filter: blur(5px);
            border: 2px solid rgba(255,255,255,0.3);
        }

        #btn-switch {
            background: #ffbe76;
            border: 3px solid #fff;
            border-radius: 20px;
            padding: 8px 15px;
            font-size: 3.5vw;
            @media (min-width: 600px) { font-size: 1.2rem; }
            font-weight: bold;
            color: #2c3e50;
            cursor: pointer;
            box-shadow: 0 4px 0px #f0932b;
            flex-shrink: 0;
        }

        /* SCHERMATA INIZIO */
        #schermata-inizio {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, #6a11cb, #2575fc);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        #schermata-inizio h1 {
            color: #fff;
            font-size: 3rem;
            text-align: center;
            text-shadow: 3px 3px 0px #ff4757;
            margin-bottom: 30px;
        }
        .btn-gioca {
            background-color: #2ed573;
            color: white;
            border: 4px solid #fff;
            padding: 15px 50px;
            font-size: 2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0px #26af5f;
        }

        /* ZONE DEL GIOCO */
        .zona-elementi {
            position: absolute;
            top: 25%;
            width: 100%;
            display: flex;
            justify-content: space-around;
            box-sizing: border-box;
            padding: 0 10px;
        }

        .zona-target {
            position: absolute;
            bottom: 15%;
            width: 100%;
            display: flex;
            justify-content: space-around;
            box-sizing: border-box;
            padding: 0 10px;
        }

        /* BLOCCHI NUMERI / LETTERE */
        .blocco {
            width: 22vw;
            height: 22vw;
            max-width: 110px;
            max-height: 110px;
            background: #fff;
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.8rem;
            font-weight: bold;
            color: #333;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            touch-action: none; /* Impedisce lo scroll della pagina su APK mentre si trascina */
            user-select: none;
            position: relative;
            z-index: 5;
        }

        /* Stile speciale per l'elemento che viene trascinato */
        .trascinamento {
            opacity: 0.9;
            transform: scale(1.1);
            z-index: 50;
            box-shadow: 0 15px 25px rgba(0,0,0,0.4);
        }

        /* Sagome grigie in basso (Target) */
        .sagoma {
            width: 22vw;
            height: 22vw;
            max-width: 110px;
            max-height: 110px;
            background: rgba(255, 255, 255, 0.15);
            border: 4px dashed rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2.8rem;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
            box-shadow: inset 0 4px 10px rgba(0,0,0,0.3);
            box-sizing: border-box;
        }
    </style>
</head>
<body>

    <div class="stelle"></div>

    <div id="schermata-inizio">
        <h1>🧩 L'Incastro Magico 🧩</h1>
        <button class="btn-gioca" onclick="iniziaGioco()">GIOCA!</button>
    </div>

    <div id="top-bar">
        <button id="btn-switch" onclick="cambiaModalita()">🔤 Lettere</button>
        <div id="hud"><span id="testo-hud">Incastra i numeri!</span></div>
    </div>

    <div class="zona-elementi" id="contenitore-elementi"></div>

    <div class="zona-target" id="contenitore-target"></div>

    <script>
        let modalitaCorrente = 'numeri';
        const alfabeto = ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H', 'I', 'L', 'M', 'N', 'O', 'P', 'Q', 'R', 'S', 'T', 'U', 'V', 'Z'];
        const colori = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502', '#ff4081', '#9b59b6'];

        let audioCtx = null;
        let completatiInQuestoTurno = 0;

        function iniziaGioco() {
            document.getElementById('schermata-inizio').style.display = 'none';
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            } catch(e) { console.log("Audio non supportato"); }

            setTimeout(() => {
                parla("Incastra i numeri!");
                generaNuovoTurno();
            }, 500);
        }

        function parla(testo) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                let messaggio = new SpeechSynthesisUtterance(testo);
                messaggio.lang = 'it-IT';
                messaggio.pitch = 1.3;
                messaggio.rate = 0.95;
                window.speechSynthesis.speak(messaggio);
            }
        }

        function cambiaModalita() {
            if (modalitaCorrente === 'numeri') {
                modalitaCorrente = 'lettere';
                document.getElementById('btn-switch').innerText = '🔢 Numeri';
                document.getElementById('testo-hud').innerText = 'Incastra le lettere!';
                parla("Giochiamo con le lettere! Incastra le lettere!");
            } else {
                modalitaCorrente = 'numeri';
                document.getElementById('btn-switch').innerText = '🔤 Lettere';
                document.getElementById('testo-hud').innerText = 'Incastra i numeri!';
                parla("Giochiamo con i numeri! Incastra i numeri!");
            }
            riproduciSuono('reset');
            setTimeout(generaNuovoTurno, 1500);
        }

        function generaNuovoTurno() {
            completatiInQuestoTurno = 0;
            const containerElementi = document.getElementById('contenitore-elementi');
            const containerTarget = document.getElementById('contenitore-target');
            containerElementi.innerHTML = '';
            containerTarget.innerHTML = '';

            // 1. Scegli 3 valori casuali unici
            let valoriTurno = [];
            while(valoriTurno.length < 3) {
                let v = modalitaCorrente === 'numeri' ? Math.floor(Math.random() * 10) + 1 : alfabeto[Math.floor(Math.random() * alfabeto.length)];
                if(!valoriTurno.includes(v)) valoriTurno.push(v);
            }

            // 2. Crea le sagome fisse in basso (nell'ordine originale)
            valoriTurno.forEach(val => {
                let t = document.createElement('div');
                t.className = 'sagoma';
                t.id = 'target-' + val;
                t.innerText = val;
                containerTarget.appendChild(t);
            });

            // 3. Mescola l'ordine per i blocchi da trascinare in alto
            let valoriMescolati = [...valoriTurno].sort(() => Math.random() - 0.5);

            // 4. Crea i blocchi colorati trascinabili
            valoriMescolati.forEach(val => {
                let b = document.createElement('div');
                b.className = 'blocco';
                b.innerText = val;
                b.style.backgroundColor = colori[Math.floor(Math.random() * colori.length)];
                b.style.color = '#white';
                b.style.color = 'white';
                b.style.textShadow = '2px 2px 4px rgba(0,0,0,0.3)';

                // Salviamo il valore per il controllo dell'incastro
                b.dataset.valore = val;

                // Attiviamo il trascinamento touch (ottimizzato per APK)
                attivaDragAndDrop(b);

                containerElementi.appendChild(b);
            });
        }

        function attivaDragAndDrop(elemento) {
            let infoTouch = { posXIniziale: 0, posYIniziale: 0, objX: 0, objY: 0 };

            elemento.addEventListener('touchstart', function(e) {
                let t = e.touches[0];
                elemento.classList.add('trascinamento');

                // Salviamo la posizione di partenza del blocco (relativa a se stesso)
                let rect = elemento.getBoundingClientRect();

                // Coordinate iniziali del tocco e del blocco
                infoTouch.posXIniziale = t.clientX;
                infoTouch.posYIniziale = t.clientY;
                infoTouch.objX = elemento.offsetLeft;
                infoTouch.objY = elemento.offsetTop;

                elemento.style.position = 'fixed';
                elemento.style.left = rect.left + 'px';
                elemento.style.top = rect.top + 'px';
                elemento.style.margin = '0';
            });

            elemento.addEventListener('touchmove', function(e) {
                if (!elemento.classList.contains('trascinamento')) return;
                let t = e.touches[0];

                // Calcoliamo lo spostamento
                let deltaX = t.clientX - infoTouch.posXIniziale;
                let deltaY = t.clientY - infoTouch.posYIniziale;

                // Muoviamo il blocco seguendo il dito
                let rect = document.getElementById('contenitore-elementi').getBoundingClientRect();
                elemento.style.left = (infoTouch.objX + deltaX) + 'px';
                elemento.style.top = (infoTouch.top + deltaY || infoTouch.posYIniziale + deltaY - 50) + 'px';
            });

            elemento.addEventListener('touchend', function(e) {
                elemento.classList.remove('trascinamento');

                // Individuiamo la sagoma bersaglio corrispondente
                let val = elemento.dataset.valore;
                let targetSagoma = document.getElementById('target-' + val);
                let rectTarget = targetSagoma.getBoundingClientRect();
                let rectElemento = elemento.getBoundingClientRect();

                // Calcolo della distanza dal centro dell'incastro
                let centroTargetX = rectTarget.left + rectTarget.width / 2;
                let centroTargetY = rectTarget.top + rectTarget.height / 2;
                let centroElemX = rectElemento.left + rectElemento.width / 2;
                let centroElemY = rectElemento.top + rectElemento.height / 2;

                let distanza = Math.hypot(centroTargetX - centroElemX, centroTargetY - centroElemY);

                // Se la distanza è inferiore a 75 pixel, l'incastro ha successo!
                if (distanza < 75) {
                    riproduciSuono('pop');
                    parla(val.toString());

                    // Blocca l'elemento sopra la sagoma
                    elemento.style.position = 'absolute';
                    elemento.style.left = targetSagoma.offsetLeft + 'px';
                    elemento.style.top = document.getElementById('contenitore-target').offsetTop + 'px';
                    elemento.style.pointerEvents = 'none'; // Non si può più muovere
                    elemento.style.transform = 'scale(1.05)';

                    completatiInQuestoTurno++;

                    // Se tutti e 3 sono incastrati, il livello è vinto!
                    if (completatiInQuestoTurno === 3) {
                        setTimeout(() => {
                            riproduciSuono('vittoria');
                            parla("Bravissimo! Ottimo lavoro!");
                            setTimeout(generaNuovoTurno, 1800);
                        }, 500);
                    }
                } else {
                    // Errore: l'elemento ritorna indietro fluidamente
                    riproduciSuono('errore');
                    elemento.style.position = '';
                    elemento.style.left = '';
                    elemento.style.top = '';
                }
            });
        }

        function riproduciSuono(tipo) {
            if (!audioCtx) return;
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            let t = audioCtx.currentTime;

            if (tipo === 'pop') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, t);
                osc.frequency.exponentialRampToValueAtTime(1000, t + 0.1);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (tipo === 'errore') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, t);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
                osc.start(t); osc.stop(t + 0.15);
            } else if (tipo === 'vittoria') {
                let note = [329.63, 392.00, 523.25, 659.25];
                note.forEach((f, i) => {
                    let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
                    o.connect(g); g.connect(audioCtx.destination); o.type = 'sine';
                    o.frequency.setValueAtTime(f, t + (i * 0.1));
                    g.gain.setValueAtTime(0.15, t + (i * 0.1));
                    g.gain.exponentialRampToValueAtTime(0.01, t + (i * 0.1) + 0.2);
                    o.start(t + (i * 0.1)); o.stop(t + (i * 0.1) + 0.2);
                });
            } else if (tipo === 'reset') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.linearRampToValueAtTime(500, t + 0.2);
                gain.gain.setValueAtTime(0.05, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            }
        }
    </script>
</body>
</html>
